[alembic]
# Onde ficam os arquivos e scripts de migração do seu projeto
script_location = alembic

# Adiciona o diretório atual ao caminho de busca do Python (evita erros de import)
prepend_sys_path = .

# URL padrão para uso local. Use SQLite quando não houver DATABASE_URL.
# O arquivo em alembic/env.py prioriza DATABASE_URL quando definido no ambiente.
sqlalchemy.url = sqlite:///./sistema_reservas.db

# Formato padrão de codificação para salvar os novos arquivos de migração
output_encoding = utf-8


# ----------------------------------------------------
# Configurações de Logs (Para ver o que o Alembic está fazendo no terminal)
# ----------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
# Define como as mensagens aparecem na tela (Hora [Nível] Mensagem)
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S